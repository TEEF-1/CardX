<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardX VIP | متجر البطاقات الرقمية الضخمة</title>
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f1c40f;
            --dark-bg: #050505;
            --card-bg: #111;
            --usdt-green: #26a17b;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* هيدر الموقع */
        header {
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            padding: 70px 20px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
        }

        header h1 { font-size: 3.5rem; margin: 0; letter-spacing: 3px; font-weight: 900; }
        header h1 span { color: var(--gold); }
        .subtitle { color: var(--text-muted); font-size: 1.2rem; margin-top: 15px; }

        .container { max-width: 1100px; margin: auto; padding: 50px 20px; }

        /* شبكة البطاقات */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        /* حاوية البطاقة بالكامل (الفيزا + تفاصيل السعر) */
        .card-group {
            transition: 0.4s ease-in-out;
            border-radius: 20px;
            overflow: hidden; /* لتأثير الحواف الناعمة */
            border: 2px solid transparent; /* إطار شفاف في الحالة العادية */
        }

        /* تأثير التفاعل (Hover) على المجموعة بالكامل */
        .card-group:hover {
            transform: translateY(-15px) scale(1.02); /* رفع البطاقة وتكبيرها قليلاً */
            border-color: var(--gold); /* إظهار الإطار الذهبي */
            /* تأثير التوهج الذهبي الفخم (Glow) */
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.4); 
        }

        .visa-card-visual {
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            padding: 25px;
            height: 180px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: left;
            direction: ltr;
        }

        .chip { width: 50px; height: 38px; background: linear-gradient(135deg, #d4af37 0%, #8a6d3b 100%); border-radius: 7px; }
        .logo-visa { font-weight: bold; font-style: italic; font-size: 1.8rem; color: #fff; }
        .card-number { font-size: 1.3rem; color: #fff; letter-spacing: 3px; margin-top: 20px; }

        .card-info-box {
            background: var(--card-bg);
            padding: 25px;
            border: 1px solid #222;
            border-top: none;
            text-align: right;
            direction: rtl;
        }

        .balance-label { color: var(--text-muted); font-size: 0.9rem; }
        .balance-amount { display: block; font-size: 2.4rem; font-weight: bold; color: var(--gold); margin: 5px 0; }
        .sale-price { font-size: 1.4rem; color: #fff; background: #222; padding: 12px; border-radius: 10px; border-right: 5px solid var(--gold); }

        /* بوابة الدفع */
        .payment-gateway {
            background: #0f0f0f;
            border-radius: 25px;
            padding: 40px;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .payment-gateway h2 { color: var(--gold); text-align: center; margin-bottom: 40px; font-size: 2rem; }

        .step {
            display: flex;
            background: #161616;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border-right: 5px solid var(--gold);
        }

        .step-num {
            background: var(--gold);
            color: #000;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-left: 15px;
            flex-shrink: 0;
        }

        /* صندوق المحفظة */
        .wallet-container {
            background: #000;
            padding: 25px;
            border-radius: 15px;
            border: 1px dashed var(--usdt-green);
            text-align: center;
            margin: 20px 0;
        }

        .wallet-address {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            color: var(--usdt-green);
            word-break: break-all;
            background: #111;
            padding: 15px;
            border-radius: 8px;
            display: block;
            margin-top: 10px;
            user-select: all;
        }

        .btn-confirm {
            display: block;
            background: linear-gradient(135deg, #0088cc 0%, #005580 100%);
            color: white;
            text-align: center;
            padding: 22px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.5rem;
            margin-top: 40px;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,136,204,0.4);
        }

        .btn-confirm:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,136,204,0.6); }

        .warning {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            margin-top: 20px;
            border: 1px solid #ff4444;
        }

        footer { text-align: center; padding: 60px 20px; color: #444; font-size: 0.9rem; border-top: 1px solid #111; margin-top: 50px; }
    </style>
</head>
